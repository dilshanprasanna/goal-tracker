<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Goal Items</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="items-body">
    <div class="items-shell">
        <header class="items-topbar">
            <a href="index.html" class="ghost-btn back-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
            <h1 class="items-title">Your Goal Items</h1>
            <span id="itemsUserLabel" class="items-user"></span>
        </header>

        <section class="balance-container">
            <label for="accountBalance">My Account Balance</label>
            <input type="number" id="accountBalance" placeholder="0.00" min="0" step="0.01">
            <small>Used to calculate progress for every item</small>
        </section>

        <section class="items-actions">
            <button id="openAddItemBtn" class="main-btn" type="button">
                <i class="fas fa-plus"></i> Add New Item
            </button>
        </section>

        <main class="items-grid" id="itemsGrid"></main>
    </div>

    <div id="itemModal" class="modal" aria-hidden="true">
        <div class="modal-content form-box">
            <button class="close-btn" type="button" data-close="itemModal">&times;</button>
            <h3>Add New Item</h3>
            <form id="addItemForm">
                <label>Item Name (required)</label>
                <input id="itemName" type="text" required>

                <label>Subtitle (optional)</label>
                <input id="itemSubtitle" type="text">

                <label>Main Image URL (required)</label>
                <input id="itemImage" type="url" placeholder="https://example.com/item.jpg" required>

                <label>Price (required)</label>
                <input id="itemPrice" type="number" min="0" step="0.01" required>

                <label>Description (optional, max 1000 words)</label>
                <textarea id="itemDescription" rows="5" placeholder="Write details about your goal item..."></textarea>

                <button class="submit-btn" type="submit">Save Item</button>
            </form>
            <p id="itemFormMessage" class="auth-message"></p>
        </div>
    </div>

    <div id="itemDetailModal" class="modal" aria-hidden="true">
        <div class="modal-content detail-box">
            <button class="close-btn" type="button" data-close="itemDetailModal">&times;</button>
            <form id="itemDetailForm">
                <h3>Edit Item</h3>

                <label>Item Name</label>
                <input id="detailName" type="text" required>

                <label>Subtitle</label>
                <input id="detailSubtitle" type="text">

                <label>Main Image URL</label>
                <input id="detailImage" type="url" required>

                <label>Price</label>
                <input id="detailPrice" type="number" min="0" step="0.01" required>

                <div class="detail-progress-wrap">
                    <p>Current Progress</p>
                    <div class="progress-container">
                        <div id="detailProgressBar" class="progress-bar"></div>
                    </div>
                    <span id="detailProgressText" class="buy-status"></span>
                </div>

                <label>Description (optional, max 1000 words)</label>
                <textarea id="detailDescription" rows="7"></textarea>

                <div class="extra-images-head">
                    <p>Extra Images (up to 5)</p>
                    <div class="extra-input-row">
                        <input id="extraImageInput" type="url" placeholder="https://example.com/extra-image.jpg">
                        <button id="addExtraImageBtn" type="button" class="ghost-btn">Add</button>
                    </div>
                </div>

                <div id="extraImagesList" class="extra-images-list"></div>

                <div class="detail-actions">
                    <button id="deleteItemBtn" type="button" class="danger-btn">Delete Item</button>
                    <button class="submit-btn" type="submit">Save Changes</button>
                </div>
            </form>
            <p id="detailMessage" class="auth-message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
